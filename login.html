<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - GameZone</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-box { max-width: 400px; margin: 60px auto; background-color: #151922; padding: 40px; border-radius: 8px; border: 1px solid #232a38; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px;}
        .form-group input { width: 100%; padding: 12px; background-color: #232a38; border: 1px solid #343f54; color: white; border-radius: 4px; outline: none; }
        .form-group input:focus { border-color: #ff4655; }
        .submit-login { width: 100%; padding: 12px; background-color: #ff4655; border: none; color: white; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px;}
    </style>
</head>
<body>
    <header>
        <div class="container"><div class="top-bar"><div class="logo"><a href="index.html">GAME<span>ZONE</span></a></div><div class="search-bar"><input type="text"><button>Tìm</button></div><div class="header-actions"><a href="login.html" class="login-btn">Đăng nhập</a><a href="cart.html" class="cart-status">Giỏ hàng <span class="count">0</span></a></div></div><div class="main-nav"><div class="categories-dropdown">🕹️ DANH MỤC GAME</div><ul class="nav-links"><li><a href="index.html">Trang chủ</a></li><li><a href="shop.html">Cửa hàng</a></li><li><a href="news.html">Tin tức</a></li></ul></div></div>
    </header>

    <main class="container">
        <div class="login-box">
            <h2 style="text-align: center; margin-bottom: 25px; text-transform: uppercase; color: #ff4655;">Đăng Nhập</h2>
            <form action="#">
                <div class="form-group">
                    <label>Tên tài khoản hoặc Email</label>
                    <input type="text" required placeholder="Nhập tài khoản...">
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" required placeholder="Nhập mật khẩu...">
                </div>
                <button type="submit" class="submit-login" onclick="alert('Đăng nhập thành công!')">ĐĂNG NHẬP</button>
            </form>
            <p style="text-align: center; margin-top: 20px; font-size: 14px; color:#aaa;">Chưa có tài khoản? <a href="#" style="color: #ff4655;">Đăng ký ngay</a></p>
        </div>
    </main>
</body>
</html>
