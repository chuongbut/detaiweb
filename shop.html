<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>GameZone - Cửa Hàng & Danh Mục</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .product-img-box {
            width: 100%;
            height: 320px;
            background-color: #0b0e14;
            overflow: hidden;
            cursor: pointer;
        }
        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            transition: transform 0.4s ease;
        }
        .product-card:hover .product-img {
            transform: scale(1.06);
        }
        #shop-grid {
            animation: fadeIn 0.4s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="top-bar">
                <div class="logo"><a href="index.html">GAME<span>ZONE</span></a></div>
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="Tìm kiếm game..." oninput="searchGame()">
                    <button onclick="searchGame()">Tìm</button>
                </div>
                <div class="header-actions">
                    <a href="cart.html" class="cart-status">Giỏ hàng <span class="count" id="global-cart-count">0</span></a>
                </div>
            </div>
            <div class="main-nav">
                <ul class="nav-links">
                    <li><a href="index.html">Trang chủ</a></li>
                    <li><a href="shop.html" class="active">Cửa hàng (Danh mục)</a></li>
                    <li><a href="news.html">Tin tức</a></li>
                </ul>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="section-title"><h2>🕹️ LỌC THEO THỂ LOẠI GAME</h2></div>
        
        <div class="category-menu">
            <button class="cat-btn active" onclick="filterCategory('all', this)">Tất Cả Game</button>
            <button class="cat-btn" onclick="filterCategory('action', this)">Hành Động / RPG</button>
            <button class="cat-btn" onclick="filterCategory('sports', this)">Thể Thao / Đua Xe</button>
            <button class="cat-btn" onclick="filterCategory('strategy', this)">Chiến Thuật / Mô Phỏng</button>
        </div>

        <div class="product-grid" id="shop-grid"></div>
    </main>

    <script src="database.js"></script>
    <script>
        let currentCategory = 'all';

        function renderShop(gamesList) {
            const shopGrid = document.getElementById('shop-grid');
            shopGrid.innerHTML = '';
            
            if (gamesList.length === 0) {
                shopGrid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: #aaa; padding: 40px 0;">Không tìm thấy tựa game nào phù hợp!</p>`;
                return;
            }

            gamesList.forEach(game => {
                shopGrid.innerHTML += `
                    <div class="product-card">
                        <div class="product-img-box" onclick="goToDetail(${game.id})">
                            <img class="product-img" src="${game.img}" alt="${game.name}">
                        </div>
                        <div class="product-info">
                            <span class="product-tag">${game.tag}</span>
                            <div class="product-name" onclick="goToDetail(${game.id})">${game.name}</div>
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:auto;">
                                <span class="price">${game.price.toLocaleString('vi-VN')}đ</span>
                                <button class="buy-btn" onclick="addToCart(${game.id})">Mua</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function filterCategory(categoryName, buttonElement) {
            currentCategory = categoryName;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
            document.getElementById('search-input').value = '';
            const filteredGames = categoryName === 'all' ? gamesDatabase : gamesDatabase.filter(g => g.category === categoryName);
            renderShop(filteredGames);
        }

        function searchGame() {
            const keyword = document.getElementById('search-input').value.toLowerCase().trim();
            let baseList = currentCategory === 'all' ? gamesDatabase : gamesDatabase.filter(g => g.category === currentCategory);
            let resultList = baseList.filter(game => game.name.toLowerCase().includes(keyword));
            renderShop(resultList);
        }

        function goToDetail(id) {
            localStorage.setItem('targetGameId', id);
            window.location.href = 'product-detail.html';
        }

        function addToCart(id) {
            let cart = JSON.parse(localStorage.getItem('mainCart')) || [];
            const game = gamesDatabase.find(g => g.id === id);
            const exist = cart.find(item => item.id === id);
            if(exist) {
                exist.quantity += 1;
            } else {
                cart.push({...game, quantity: 1});
            }
            localStorage.setItem('mainCart', JSON.stringify(cart));
            alert(`Đã thêm "${game.name}" vào giỏ hàng!`);
            updateGlobalCartCount();
        }

        renderShop(gamesDatabase);
        updateGlobalCartCount();
    </script>
</body>
</html>
